name: Deploy Quarto Site 

on:
  push:
    branches: [main]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # --- Added Python and Jupyter installation ---
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' 

      - name: Install Jupyter dependencies
        run: python3 -m pip install jupyter nbformat
      # --------------------------------------------------

      - name: Render site
        run: quarto render

      - name: Copy presentation slides into site output
        run: |
          mkdir -p _site/slides
          cp -r slides/slides.html slides/slides_files slides/images _site/slides/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com